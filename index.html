<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIYA INSAN MADANI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f8a4a">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
padding:0;
}

header{
background:#0f8a4a;
color:white;
padding:20px;
text-align:center;
}

.logo{
width:80px;
}

.container{
padding:20px;
}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.btn{
background:#0f8a4a;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* floating menu */
.float-menu{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.float-btn{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
text-decoration:none;
animation:float 2s infinite;
}

.wa-btn{
background:#25D366;
}

.tel-btn{
background:#0f8a4a;
}

.menu-toggle{
background:#333;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0px)}
}

.hidden{
display:none;
}

/* tombol install */
.install-btn{
position:fixed;
bottom:20px;
left:20px;
background:#0f8a4a;
color:white;
padding:15px 18px;
border-radius:50px;
cursor:pointer;
display:none;
z-index:999;
}

</style>

</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>GRIYA INSAN MADANI</h1>
<p>Belajar cepat, mudah, dan murah</p>
</header>

<div class="container">

<div class="card">
<h2>Jadwal Kursus</h2>
<p>Senin, Selasa, Rabu</p>
<p>Siang: 14.00 - 16.00 WIB</p>
<p>Malam: 19.30 - 21.30 WIB</p>
</div>

<div class="card">
<h2>Daftar Peserta</h2>
<input type="text" id="nama" placeholder="Nama Peserta">
<br><br>
<button class="btn" onclick="tambahPeserta()">Tambah</button>
<ul id="list"></ul>
</div>

</div>

<!-- tombol whatsapp -->
<a href="https://wa.me/628117677050" class="wa-float">
WhatsApp
</a>

<!-- tombol install -->
<button id="installBtn" class="install-btn">
Install App
</button>

<script>

function tambahPeserta(){
var nama=document.getElementById('nama').value;
var li=document.createElement('li');
li.textContent=nama;
document.getElementById('list').appendChild(li);
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById('installBtn').style.display='block';

});


document.getElementById('installBtn').addEventListener('click',()=>{

if(deferredPrompt){

deferredPrompt.prompt();

}

});


if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js');

}

</script>





<div class="container">
<div class="card">
<h2>Pendaftaran Online</h2>

<input type="text" id="namaDaftar" placeholder="Nama Lengkap"><br><br>
<input type="text" id="alamatDaftar" placeholder="Alamat"><br><br>
<input type="text" id="hpDaftar" placeholder="Nomor WhatsApp"><br><br>

<select id="kursusDaftar">
<option value="Microsoft Office">Microsoft Office</option>
<option value="Google Workspace">Google Workspace</option>
<option value="Desain Grafis">Desain Grafis</option>
</select>
<br><br>

<button class="btn" onclick="daftarOnline()">Daftar Sekarang</button>

<p id="statusDaftar"></p>

</div>
</div>

<script>

function daftarOnline(){

var nama=document.getElementById('namaDaftar').value;
var alamat=document.getElementById('alamatDaftar').value;
var hp=document.getElementById('hpDaftar').value;
var kursus=document.getElementById('kursusDaftar').value;

var pesan="Pendaftaran Kursus GRIYA INSAN MADANI%0A%0A"
+"Nama: "+nama+"%0A"
+"Alamat: "+alamat+"%0A"
+"No HP: "+hp+"%0A"
+"Kursus: "+kursus;

window.open("https://wa.me/628117677050?text="+pesan);


document.getElementById('statusDaftar').innerHTML="Pendaftaran berhasil, silakan kirim WhatsApp";

</script>



<div class="container">
<div class="card">
<h2>Upload Bukti Pembayaran</h2>

<input type="text" id="namaBayar" placeholder="Nama Peserta"><br><br>
<input type="file" id="buktiBayar"><br><br>

<button class="btn" onclick="uploadBayar()">Upload Bukti</button>

<div id="previewBayar"></div>

</div>
</div>

<script>

function uploadBayar(){

var nama=document.getElementById('namaBayar').value;
var file=document.getElementById('buktiBayar').files[0];

var reader=new FileReader();

reader.onload=function(e){

var img=document.createElement('img');
img.src=e.target.result;
img.style.width='200px';
img.style.marginTop='10px';

var div=document.getElementById('previewBayar');

div.innerHTML='<p>Bukti Pembayaran: '+nama+'</p>';

div.appendChild(img);

var pesan="Upload Bukti Pembayaran%0A%0A"+"Nama: "+nama;

window.open("https://wa.me/628117677050?text="+pesan);

}

if(file){
reader.readAsDataURL(file);
}

}

</script>

<div class="float-menu">
<a href="tel:+628117677050" class="float-btn tel-btn hidden" id="telBtn">📞</a>
<a href="https://wa.me/628117677050" class="float-btn wa-btn hidden" id="waBtn">💬</a>
<div class="float-btn menu-toggle" onclick="toggleMenu()">☰</div>
</div>

<script>

function toggleMenu(){

document.getElementById('waBtn').classList.toggle('hidden');

document.getElementById('telBtn').classList.toggle('hidden');

}

</script>

</html>
