<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIYA INSAN MADANI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f8a4a">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
padding:0;
}

header{
background:#0f8a4a;
color:white;
padding:20px;
text-align:center;
}

.logo{
width:80px;
}

.container{
padding:20px;
}

.card{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.btn{
background:#0f8a4a;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* tombol whatsapp */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
z-index:999;
}

/* tombol install */
.install-btn{
position:fixed;
bottom:20px;
left:20px;
background:#0f8a4a;
color:white;
padding:15px 18px;
border-radius:50px;
cursor:pointer;
display:none;
z-index:999;
}

</style>

</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>GRIYA INSAN MADANI</h1>
<p>Belajar cepat, mudah, dan murah</p>
</header>

<div class="container">

<div class="card">
<h2>Jadwal Kursus</h2>
<p>Senin, Selasa, Rabu</p>
<p>Siang: 14.00 - 16.00 WIB</p>
<p>Malam: 19.30 - 21.30 WIB</p>
</div>

<div class="card">
<h2>Daftar Peserta</h2>
<input type="text" id="nama" placeholder="Nama Peserta">
<br><br>
<button class="btn" onclick="tambahPeserta()">Tambah</button>
<ul id="list"></ul>
</div>

</div>

<!-- tombol whatsapp -->
<a href="https://wa.me/628117677050" class="wa-float">
WhatsApp
</a>

<!-- tombol install -->
<button id="installBtn" class="install-btn">
Install App
</button>

<script>

function tambahPeserta(){
var nama=document.getElementById('nama').value;
var li=document.createElement('li');
li.textContent=nama;
document.getElementById('list').appendChild(li);
}

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e)=>{

e.preventDefault();

deferredPrompt=e;

document.getElementById('installBtn').style.display='block';

});


document.getElementById('installBtn').addEventListener('click',()=>{

if(deferredPrompt){

deferredPrompt.prompt();

}

});


if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js');

}

</script>

</body>
</html>
