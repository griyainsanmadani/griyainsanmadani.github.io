<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRIYA INSAN MADANI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:linear-gradient(90deg,#0f8a4a,#d32f2f);
color:white;
padding:20px;
text-align:center;
}

nav{
background:#333;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

.btn{
background:#0f8a4a;
color:white;
padding:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

.btn:hover{
background:#d32f2f;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.box{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

table th,table td{
padding:10px;
border:1px solid #ddd;
}

table th{
background:#0f8a4a;
color:white;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h1>GRIYA INSAN MADANI</h1>
<p>Kursus Komputer Profesional</p>

</header>

<nav>

<a href="#daftar">Daftar</a>
<a href="#admin">Admin</a>

</nav>

<div class="container" id="daftar">

<h2>Form Pendaftaran</h2>

<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="text" id="tempat" placeholder="Tempat Lahir">
<input type="date" id="tanggal">
<input type="text" id="alamat" placeholder="Alamat">
<input type="text" id="hp" placeholder="Nomor HP">

<select id="program">
<option>Microsoft Office</option>
<option>Google Workspace</option>
</select>

<button class="btn" onclick="simpan()">Daftar</button>

</div>

<div class="container" id="admin">

<h2>Login Admin</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<div id="adminPanel" style="display:none">

<h2>Dashboard Admin</h2>

<div class="dashboard">

<div class="box">
<h3>Total Peserta</h3>
<h2 id="total">0</h2>
</div>

<div class="box">
<h3>Microsoft Office</h3>
<h2 id="office">0</h2>
</div>

<div class="box">
<h3>Google Workspace</h3>
<h2 id="google">0</h2>
</div>

</div>

<br>

<input type="text" id="cari" placeholder="Cari peserta..." onkeyup="cariData()">

<br><br>

<button class="btn" onclick="downloadExcel()">Download Excel</button>

<br><br>

<table>

<thead>

<tr>
<th>No</th>
<th>Nama</th>
<th>Program</th>
<th>No HP</th>
<th>WA</th>
</tr>

</thead>

<tbody id="data"></tbody>

</table>

</div>

</div>

<a href="https://wa.me/6281266277447" class="whatsapp">💬</a>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbw46ve5XYGOJKHMrUw-SRU_LdntPe10E8sPAvWaNcyuInJGhSomiCQYan42JqYpF3rGJg/exec";

let dataPeserta=[];

function simpan(){

var nama=document.getElementById("nama").value;
var tempat=document.getElementById("tempat").value;
var tanggal=document.getElementById("tanggal").value;
var alamat=document.getElementById("alamat").value;
var hp=document.getElementById("hp").value;
var program=document.getElementById("program").value;

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
nama:nama,
tempat:tempat,
tanggal:tanggal,
alamat:alamat,
hp:hp,
program:program
}),
headers:{
"Content-Type":"application/json"
}
})
.then(res=>{

alert("Pendaftaran Berhasil");

kirimWA(nama,program);

})
.catch(err=>alert("Error"));

}

function kirimWA(nama,program){

var pesan="Halo Admin, ada pendaftaran baru:%0A%0A"+
"Nama : "+nama+"%0A"+
"Program : "+program;

window.open("https://wa.me/6281266277447?text="+pesan);

}

function login(){

if(user.value=="admin" && pass.value=="12345"){

adminPanel.style.display="block";

loadData();

}else{

alert("Login Salah");

}

}

function loadData(){

fetch(scriptURL)
.then(res=>res.json())
.then(data=>{

dataPeserta=data;

tampil(data);

statistik(data);

});

}

function tampil(data){

var html="";

data.forEach(function(d,i){

html+=`

<tr>

<td>${i+1}</td>
<td>${d.nama}</td>
<td>${d.program}</td>
<td>${d.hp}</td>
<td>

<a href="https://wa.me/62${d.hp}" target="_blank">

<button class="btn">Chat</button>

</a>

</td>

</tr>

`;

});

document.getElementById("data").innerHTML=html;

}

function statistik(data){

document.getElementById("total").innerHTML=data.length;

var office=0;
var google=0;

data.forEach(function(d){

if(d.program=="Microsoft Office") office++;
if(d.program=="Google Workspace") google++;

});

document.getElementById("office").innerHTML=office;
document.getElementById("google").innerHTML=google;

}

function cariData(){

var keyword=cari.value.toLowerCase();

var filter=dataPeserta.filter(function(d){

return d.nama.toLowerCase().includes(keyword);

});

tampil(filter);

}

function downloadExcel(){

window.open(scriptURL);

}

</script>

</body>
</html>
