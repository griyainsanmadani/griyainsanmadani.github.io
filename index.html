<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kursus Komputer Griya Insan Madani</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

.btn{
background:#2e7d32;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#1b5e20;
}

.photo{
width:120px;
border-radius:10px;
margin-top:10px;
}

.print-btn{
background:#d32f2f;
color:white;
padding:8px;
border:none;
border-radius:5px;
margin-top:5px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
text-align:center;
line-height:60px;
font-size:25px;
animation:gerak 2s infinite;
}

@keyframes gerak{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

.telepon{
position:fixed;
bottom:90px;
right:20px;
background:#1976d2;
color:white;
width:60px;
height:60px;
border-radius:50%;
text-align:center;
line-height:60px;
font-size:25px;
}

</style>

</head>

<body>

<header>
<h2>Kursus Komputer</h2>
<p>Griya Insan Madani</p>
</header>

<div class="container">

<div class="card">
<h3>Pendaftaran Online</h3>

<input type="text" id="nama" placeholder="Nama Peserta">
<input type="text" id="alamat" placeholder="Alamat">

<select id="program">
<option>Microsoft Office</option>
<option>Google Workspace</option>
<option>Desain Grafis</option>
</select>

<label>Upload Foto</label>
<input type="file" id="foto">

<label>Upload Bukti Transfer</label>
<input type="file" id="bukti">

<button class="btn" onclick="simpan()">Daftar Sekarang</button>

</div>

<div id="dataPeserta"></div>

</div>

<a href="https://wa.me/628117677050" class="whatsapp">💬</a>

<a href="tel:08117677050" class="telepon">📞</a>

<script>

function simpan(){

var nama=document.getElementById('nama').value;
var alamat=document.getElementById('alamat').value;
var program=document.getElementById('program').value;

var foto=document.getElementById('foto').files[0];
var bukti=document.getElementById('bukti').files[0];

var reader1=new FileReader();
var reader2=new FileReader();

reader1.onload=function(e){

var fotoData=e.target.result;

reader2.onload=function(e2){

var buktiData=e2.target.result;

var data={
nama:nama,
alamat:alamat,
program:program,
foto:fotoData,
bukti:buktiData
};

var peserta=JSON.parse(localStorage.getItem('peserta'))||[];

peserta.push(data);

localStorage.setItem('peserta',JSON.stringify(peserta));

tampil();

}

reader2.readAsDataURL(bukti);

}

reader1.readAsDataURL(foto);

}

function tampil(){

var peserta=JSON.parse(localStorage.getItem('peserta'))||[];

var html="";

peserta.forEach(function(p){

html+=`

<div class="card">

<h3>${p.nama}</h3>
<p>${p.alamat}</p>
<p>${p.program}</p>

<img src="${p.foto}" class="photo">

<h4>Bukti Transfer</h4>

<img src="${p.bukti}" class="photo">

<br>

<button class="print-btn"
onclick="kartu('${p.nama}','${p.program}','${p.foto}')">
Cetak Kartu
</button>

<button class="print-btn"
onclick="sertifikat('${p.nama}')">
Cetak Sertifikat
</button>

</div>

`;

});

document.getElementById('dataPeserta').innerHTML=html;

}

function kartu(nama,program,foto){

var win=window.open();

win.document.write(`

<div style="text-align:center;padding:20px;border:3px solid green">

<h2>KARTU PESERTA</h2>

<img src="${foto}" width="120">

<p>Nama : ${nama}</p>

<p>Program : ${program}</p>

<p>GRIYA INSAN MADANI</p>

</div>

`);

win.print();

}

function sertifikat(nama){

var win=window.open();

win.document.write(`

<div style="text-align:center;padding:40px;border:5px solid green">

<h1>SERTIFIKAT</h1>

<p>Diberikan Kepada</p>

<h2>${nama}</h2>

<p>Telah Mengikuti Kursus</p>

<h3>GRIYA INSAN MADANI</h3>

</div>

`);

win.print();

}

window.onload=function(){
tampil();
}

</script>

</body>

</html>
