<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRIYA INSAN MADANI COURSE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

html{
scroll-behavior:smooth;
}

section{
scroll-margin-top:100px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
background:linear-gradient(90deg,#0f8a4a,#d32f2f);
color:white;
padding:20px;
}

.logo{width:70px}

/* NAV */
nav{
background:#333;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:999;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{color:#ffd700}

/* CONTAINER */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* FORM */
input, select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}

input:focus{
border:2px solid #0f8a4a;
outline:none;
}

/* BUTTON */
.btn{
background:#0f8a4a;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
}

.btn:hover{
background:#d32f2f;
}

/* DASHBOARD */
.dashboard{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.box{
flex:1;
background:#0f8a4a;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

/* NOTIFIKASI */
.notif{
position:fixed;
top:20px;
right:20px;
background:#0f8a4a;
color:white;
padding:15px;
border-radius:8px;
display:none;
}

/* WA */
.wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
text-decoration:none;
}

/* SOSMED */
.sosmed{
position:fixed;
right:20px;
bottom:100px;
}

.sosmed a{
display:block;
width:50px;
height:50px;
margin:8px 0;
border-radius:50%;
color:white;
text-align:center;
line-height:50px;
transform:translateY(20px);
opacity:0;
transition:0.3s;
}

.sosmed.show a{
opacity:1;
transform:translateY(0);
}

.fb{background:#1877f2}
.ig{background:#e4405f}
.yt{background:#ff0000}

.toggle{
background:#0f8a4a;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* FOOTER */
.footer{
background:#333;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header class="header">
<img src="logo.png" class="logo">
<div>
<h2>GRIYA INSAN MADANI COURSE</h2>
<p>Kursus Komputer Profesional</p>
</div>
</header>

<nav>
<a href="#program">Program</a>
<a href="#daftar">Daftar</a>
<a href="#admin">Admin</a>
</nav>

<section id="program">
<div class="container">
<h2>Program</h2>

<div class="card">
<h3>Microsoft Office</h3>
<p>Word, Excel, PowerPoint</p>
</div>

<div class="card">
<h3>Google Workspace</h3>
<p>Docs, Sheets, Slides, Drive</p>
</div>

</div>
</section>

<section id="daftar">
<div class="container">
<h2>Pendaftaran</h2>

<input id="nama" placeholder="Nama">
<input id="hp" placeholder="Nomor HP">

<select id="program">
<option>Microsoft Office</option>
<option>Google Workspace</option>
</select>

<button class="btn" onclick="daftar()">Daftar Sekarang</button>

</div>
</section>

<section id="admin">
<div class="container">

<h2>Admin</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<div id="panel" style="display:none">

<div class="dashboard">
<div class="box"><h3>Total</h3><h2 id="total">0</h2></div>
<div class="box"><h3>Office</h3><h2 id="office">0</h2></div>
<div class="box"><h3>Google</h3><h2 id="google">0</h2></div>
</div>

<br>

<button class="btn" onclick="download()">Download Excel</button>

<table>
<thead>
<tr><th>No</th><th>Nama</th><th>Program</th><th>HP</th></tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

</div>
</section>

<!-- SOSMED -->
<div class="sosmed" id="sosmed">
<a href="https://www.facebook.com/LKPGIM/" class="fb"><i class="fab fa-facebook-f"></i></a>
<a href="https://www.instagram.com/griyainsanmadanicourse/" class="ig"><i class="fab fa-instagram"></i></a>
<a href="https://www.youtube.com/@pembelajarchannel/" class="yt"><i class="fab fa-youtube"></i></a>
<div class="toggle" onclick="toggle()">☰</div>
</div>

<a href="https://wa.me/6281266277447" class="wa"><i class="fab fa-whatsapp"></i></a>

<div class="notif" id="notif">Berhasil daftar ✅</div>

<script>

const url="https://script.google.com/macros/s/AKfycbzO0bNzBsrMUpcV4krhty_awua1RDMfcOWAyYC7IFE4CiCodqYYwFp3bI-C6YVZcT27/exec";

/* DAFTAR */
function daftar(){

let nama=nama.value;
let hp=hp.value;
let program=program.value;

if(!nama || !hp){
alert("Isi data dulu!");
return;
}

fetch(url,{
method:"POST",
body:JSON.stringify({nama,hp,program}),
headers:{"Content-Type":"application/json"}
});

notif.style.display="block";
setTimeout(()=>notif.style.display="none",3000);

window.open("https://wa.me/6281266277447?text=Nama:"+nama+" Program:"+program);

}

/* LOGIN */
function login(){
if(user.value=="admin" && pass.value=="12345"){
panel.style.display="block";
load();
}else alert("Salah");
}

/* LOAD DATA */
function load(){
fetch(url)
.then(r=>r.json())
.then(data=>{

let html="";
let office=0, google=0;

data.forEach((d,i)=>{
html+=`<tr>
<td>${i+1}</td>
<td>${d.nama}</td>
<td>${d.program}</td>
<td>${d.hp}</td>
</tr>`;

if(d.program=="Microsoft Office") office++;
if(d.program=="Google Workspace") google++;
});

document.getElementById("data").innerHTML=html;
total.innerHTML=data.length;
office.innerHTML=office;
google.innerHTML=google;

});
}

/* DOWNLOAD */
function download(){
window.open(url);
}

/* SOSMED */
function toggle(){
sosmed.classList.toggle("show");
}

</script>

<footer class="footer">
<p>© 2026 GIMC</p>
</footer>

</body>
</html>
